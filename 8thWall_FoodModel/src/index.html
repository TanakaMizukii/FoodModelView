<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>Food Model 8th Wall View</title>

  <!-- 8th Wall メタタグ -->
  <meta name="8thwall:renderer" content="threejs:146"/>
  <meta name="8thwall:package" content="@8thwall.xrextras"/>
  <meta name="8thwall:package" content="@8thwall.landing-page"/>

  <!-- Three.js (グローバル) -->
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>

  <!-- Three.js アドオン (グローバル THREE に追記) -->
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/loaders/GLTFLoader.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/loaders/DRACOLoader.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/loaders/KTX2Loader.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/renderers/CSS2DRenderer.js"></script>

  <!-- 8th Wall SDK -->
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script>
</head>

<body>

  <!-- AR中のUI -->
  <div id="ar-ui" class="ar-ui hidden">
    <div>ARモード動作中</div>
    <div>商品の選択可能</div>
  </div>

  <!-- 3Dビュワーへ戻るボタン -->
  <button id="exit-button" class="send-viewer-button hidden" onclick="onExit()">3Dビュワーへ</button>

  <!-- モデルクリアボタン -->
  <div id="clear-objects" class="clear-objects hidden">
    <button id="clear-button" class="clear-button" onclick="onClear()">♻️</button>
    <div id="clear-text" class="clear-text">モデルクリア</div>
  </div>

  <!-- メニューコンテナー -->
  <div class="menu-container collapsed hidden" id="menuContainer">
    <div class="menu-toggle" id="menuToggle">
      <span id="toggleText">メニューを開く</span>
    </div>
    <div class="tab-navigation" id="tabNavigation">
      <!-- タブはui.jsにて動的に生成 -->
    </div>
    <div class="menu-content" id="menuContent">
      <!-- メニュー項目はui.jsにて動的に生成 -->
    </div>
  </div>

  <!-- デスクトップ用のメニュートグルボタン -->
  <div class="menu-toggle-desktop hidden" id="menuToggleDesktop">
    <span id="toggleText">メニューを開く</span>
  </div>

  <!-- ローディングインジケーター -->
  <div id="loading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">モデルを読み込み中...</div>
  </div>

  <script src="bundle.js"></script>
</body>

</html>
